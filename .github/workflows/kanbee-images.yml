name: Build Kanbee custom images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      PUPPETEER_SKIP_DOWNLOAD: '1'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      CYPRESS_INSTALL_BINARY: '0'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout kanbee-deploy (branding assets)
        uses: actions/checkout@v4
        with:
          repository: pinapple-org/kanbee-deploy
          path: common/temp/kanbee-deploy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Read platform version
        id: version
        run: |
          VERSION=$(node -p "require('fs').readFileSync('common/scripts/version.txt','utf8').trim().replace(/\"/g,'')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building images tagged :$VERSION"

      - name: Rush install
        run: node common/scripts/install-run-rush.js install

      - name: Bundle pods (transactor, workspace, fulltext, front)
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
        run: |
          node common/scripts/install-run-rush.js bundle \
            --to @hcengineering/pod-server \
            --to @hcengineering/pod-workspace \
            --to @hcengineering/pod-fulltext \
            --to @hcengineering/pod-front

      - name: Build front SPA (webpack)
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
        working-directory: dev/prod
        run: npm run package

      - name: Free space before docker builds
        shell: bash
        run: |
          set -e
          echo "::group::Disk before cleanup"
          df -h /
          du -sh common/temp/node_modules common/temp/pnpm-store 2>/dev/null || true
          echo "::endgroup::"

          rm -rf common/temp/node_modules
          rm -rf common/temp/pnpm-store
          rm -rf common/temp/install-run

          # Per-package node_modules and lib/ aren't needed for docker context
          # (Dockerfiles only COPY the bundle/ output).
          find pods packages services -mindepth 2 -maxdepth 2 \
            -type d \( -name node_modules -o -name lib \) \
            -prune -exec rm -rf {} + 2>/dev/null || true
          find dev -mindepth 2 -maxdepth 2 \
            -type d -name node_modules \
            -prune -exec rm -rf {} + 2>/dev/null || true

          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: joaovrivero
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push transactor
        uses: docker/build-push-action@v5
        with:
          context: pods/server
          push: true
          provenance: false
          tags: ghcr.io/pinapple-org/kanbee-transactor:${{ steps.version.outputs.version }}

      - name: Build and push workspace
        uses: docker/build-push-action@v5
        with:
          context: pods/workspace
          push: true
          provenance: false
          tags: ghcr.io/pinapple-org/kanbee-workspace:${{ steps.version.outputs.version }}

      - name: Build and push fulltext
        uses: docker/build-push-action@v5
        with:
          context: pods/fulltext
          push: true
          provenance: false
          tags: ghcr.io/pinapple-org/kanbee-fulltext:${{ steps.version.outputs.version }}

      - name: Build and push front (with Kanbee branding)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/Dockerfile.kanbee-front
          push: true
          provenance: false
          tags: ghcr.io/pinapple-org/kanbee-front:${{ steps.version.outputs.version }}

      - name: Summary
        run: |
          echo "## Pushed images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for name in transactor workspace fulltext front; do
            echo "- \`ghcr.io/pinapple-org/kanbee-$name:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update Railway services to point at \`:${{ steps.version.outputs.version }}\`." >> "$GITHUB_STEP_SUMMARY"
